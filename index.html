<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money with Basel - تسجيل الدخول</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a12">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body {
            font-family: 'Almarai', sans-serif;
            background-color: #0a0a12;
            color: #e8e0f0;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 56px;
            margin-bottom: 12px;
            display: block;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            color: #ff2d78;
            margin-bottom: 6px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: #a098b0;
        }

        .auth-card {
            background-color: #1E1E1E;
            border: 1px solid #2D2D2D;
            border-radius: 20px;
            padding: 28px;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #28283e;
            border-radius: 9999px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            color: #a098b0;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background-color: #ff2d78;
            color: #fff;
        }

        .auth-tab-content { display: none; }
        .auth-tab-content.active { display: block; }

        .input-group { margin-bottom: 16px; }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #a098b0;
            margin-bottom: 6px;
            text-align: right;
        }

        .input-field {
            width: 100%;
            height: 48px;
            background: #28283e;
            border: 1px solid #302840;
            border-radius: 12px;
            padding: 0 16px;
            font-family: 'Almarai', sans-serif;
            font-size: 16px;
            color: #e8e0f0;
            text-align: right;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .input-field:focus {
            border-color: #ff2d78;
        }

        .btn-primary {
            width: 100%;
            height: 52px;
            background: #39FF14;
            color: #0a0a12;
            border: none;
            border-radius: 9999px;
            font-family: 'Almarai', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { opacity: 0.8; }

        .btn-secondary {
            width: 100%;
            height: 48px;
            background: transparent;
            color: #a098b0;
            border: 1px solid #302840;
            border-radius: 9999px;
            font-family: 'Almarai', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: #ff2d78;
            color: #ff2d78;
        }

        .error-message {
            background-color: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
            text-align: right;
        }

        .error-message.active { display: block; }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            color: #a098b0;
            font-size: 14px;
        }

        .loading.active { display: flex; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #302840;
            border-top-color: #ff2d78;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #5a5068;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: #5a5068;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #302840;
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="auth-header">
            <span class="auth-logo">💰</span>
            <h1 class="auth-title">Money with Basel</h1>
            <p class="auth-subtitle">لوحة قيادة مالية احترافية</p>
        </div>

        <div class="auth-card">
            <div id="error-message" class="error-message"></div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">تسجيل الدخول</div>
                <div class="auth-tab" data-tab="signup">حساب جديد</div>
            </div>

            <!-- Login -->
            <div class="auth-tab-content active" id="login-tab">
                <div class="input-group">
                    <label class="input-label">البريد الإلكتروني</label>
                    <input type="email" class="input-field" id="login-email" placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label class="input-label">كلمة المرور</label>
                    <input type="password" class="input-field" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn-primary" id="login-btn">دخول</button>
            </div>

            <!-- Signup -->
            <div class="auth-tab-content" id="signup-tab">
                <div class="input-group">
                    <label class="input-label">الاسم الكامل</label>
                    <input type="text" class="input-field" id="signup-name" placeholder="باسل محمد">
                </div>
                <div class="input-group">
                    <label class="input-label">البريد الإلكتروني</label>
                    <input type="email" class="input-field" id="signup-email" placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label class="input-label">كلمة المرور</label>
                    <input type="password" class="input-field" id="signup-password" placeholder="6 أحرف على الأقل">
                </div>
                <div class="input-group">
                    <label class="input-label">تأكيد كلمة المرور</label>
                    <input type="password" class="input-field" id="signup-confirm" placeholder="••••••••">
                </div>
                <button class="btn-primary" id="signup-btn">إنشاء الحساب</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>جاري المعالجة...</span>
            </div>

            <div class="divider">أو</div>
            <button class="btn-secondary" id="demo-btn">🎮 جرب النسخة التجريبية</button>
        </div>

        <div class="auth-footer">
            <p id="firebase-status">⏳ جاري الاتصال...</p>
        </div>
    </div>

    <!-- Firebase v9 compat (نفس الإصدار المستخدم في باقي الملفات) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ── Tab switching ──────────────────────────────────
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
                document.getElementById('error-message').classList.remove('active');
            });
        });

        // ── Helpers ────────────────────────────────────────
        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.classList.add('active');
        }

        function setLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
            ['login-btn','signup-btn','demo-btn'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.disabled = show;
            });
        }

        // ── Auth state → redirect ──────────────────────────
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'dashboard.html';
            else document.getElementById('firebase-status').textContent = '✅ جاهز للدخول';
        });

        // ── Login ──────────────────────────────────────────
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showError('أدخل البريد وكلمة المرور'); return; }
            setLoading(true);
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (e) {
                const msgs = {
                    'auth/user-not-found':  'البريد غير مسجل',
                    'auth/wrong-password':  'كلمة المرور خاطئة',
                    'auth/invalid-email':   'بريد إلكتروني غير صحيح',
                    'auth/too-many-requests':'محاولات كثيرة، انتظر قليلاً'
                };
                showError('❌ ' + (msgs[e.code] || e.message));
                setLoading(false);
            }
        });

        // ── Signup ─────────────────────────────────────────
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const name     = document.getElementById('signup-name').value.trim();
            const email    = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm  = document.getElementById('signup-confirm').value;
            if (!name || !email || !password || !confirm) { showError('ملأ جميع الحقول'); return; }
            if (password !== confirm) { showError('كلمات المرور غير متطابقة'); return; }
            if (password.length < 6)  { showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
            setLoading(true);
            try {
                const { user } = await auth.createUserWithEmailAndPassword(email, password);
                await user.updateProfile({ displayName: name });
            } catch (e) {
                const msgs = {
                    'auth/email-already-in-use': 'البريد مستخدم بالفعل',
                    'auth/weak-password':        'كلمة المرور ضعيفة جداً'
                };
                showError('❌ ' + (msgs[e.code] || e.message));
                setLoading(false);
            }
        });

        // ── Demo ───────────────────────────────────────────
        document.getElementById('demo-btn').addEventListener('click', async () => {
            setLoading(true);
            const demoEmail = 'demo@money-basel.com';
            const demoPass  = 'Demo@123456';
            try {
                await auth.signInWithEmailAndPassword(demoEmail, demoPass);
            } catch (e) {
                if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                    try {
                        await auth.createUserWithEmailAndPassword(demoEmail, demoPass);
                        await auth.currentUser.updateProfile({ displayName: 'باسل (تجريبي)' });
                    } catch (e2) {
                        showError('❌ ' + e2.message);
                        setLoading(false);
                    }
                } else {
                    showError('❌ ' + e.message);
                    setLoading(false);
                }
            }
        });

        // ── Enter key support ──────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            const activeTab = document.querySelector('.auth-tab.active')?.dataset.tab;
            if (activeTab === 'login')  document.getElementById('login-btn').click();
            if (activeTab === 'signup') document.getElementById('signup-btn').click();
        });

        // ── Service Worker ─────────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        }
    </script>
</body>
</html>
