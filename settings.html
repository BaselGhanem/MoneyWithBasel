<!-- CATEGORY MODAL -->
<div id="cat-modal" class="modal-overlay" onclick="if(event.target===this)closeCatModal()">
  <div class="modal-sheet">
    <div class="flex justify-between items-center mb-6 flex-row-reverse">
      <h2 id="cat-modal-title" class="font-headline-md text-headline-md text-on-surface">فئة جديدة</h2>

    </div>
    <!-- Emoji -->
    <div class="flex items-center gap-3 mb-4 flex-row-reverse">
      <button id="emoji-btn" onclick="document.getElementById('emoji-input').focus()" class="w-14 h-14 bg-surface-container-highest rounded-2xl text-3xl flex items-center justify-center border border-outline-variant hover:border-primary-fixed transition-colors">📦</button>
      <input id="emoji-input" type="text" placeholder="أو اكتب إيموجي" maxlength="2"

    <input id="cat-name" type="text" placeholder="اسم الفئة" class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary-container mb-4 text-right"/>

    </div>
    <select id="commit-account" class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface focus:outline-none focus:border-primary-container mb-4 text-right appearance-none"></select>
    <div class="flex gap-3 mb-4">
      <div class="flex-1 flex flex-col gap-1">

    </div>

<script src="js/app.js"></script>
<script src="js/db.js"></script>
<script>
let state={categories:[],accounts:[],commitments:[],editCat:null,editCommit:null,catType:'expense',commitType:'expense'};

auth.onAuthStateChanged(async u=>{
  if(!u){window.location.href='index.html';return;}
  app.user=u;
  renderProfile(u);
  initTheme();
  await loadAll();
});

async function loadAll(){
  const [cats,accs,commits]=await Promise.all([
    DB.getCategories(app.user.uid),
    DB.getAccounts(app.user.uid),
    DB.getCommitments(app.user.uid)
  ]);
  state.categories=cats; state.accounts=accs; state.commitments=commits;
  renderCategories(); renderCommitments(); populateAccountSelect();
}

function renderProfile(u){
  document.getElementById('profile-name').textContent=u.displayName||'المستخدم';
  document.getElementById('profile-email').textContent=u.email;
  if(u.photoURL){
    const av=`<img src="${u.photoURL}" class="w-full h-full object-cover" alt=""/>`;
    document.getElementById('profile-avatar').innerHTML=av;
    document.getElementById('hdr-avatar').innerHTML=av;
  }
}

function initTheme(){
  const saved=localStorage.getItem('theme')||'dark';
  document.documentElement.classList.toggle('dark',saved==='dark');
  document.getElementById('dark-toggle').classList.toggle('on',saved==='dark');
}
function toggleTheme(){
  const isDark=document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme',isDark?'dark':'light');
  document.getElementById('dark-toggle').classList.toggle('on',isDark);
}

function renderCategories(){
  const list=document.getElementById('categories-list');
  if(!state.categories.length){list.innerHTML='<div class="px-4 py-6 text-center text-on-surface-variant font-body-md text-body-md">لا توجد فئات. أضف فئة جديدة.</div>';return;}
  const grouped={expense:state.categories.filter(c=>c.type==='expense'),income:state.categories.filter(c=>c.type==='income')};
  list.innerHTML=`
    ${grouped.expense.length?`<div class="px-4 pt-3 pb-1"><span class="font-label-caps text-label-caps text-error">مصروفات</span></div>${grouped.expense.map(c=>catRow(c)).join('')}`:''}
    ${grouped.income.length?`<div class="px-4 pt-3 pb-1"><span class="font-label-caps text-label-caps text-[#39FF14]">دخل</span></div>${grouped.income.map(c=>catRow(c)).join('')}`:''}`;
}

function catRow(c){
  return `<div class="setting-row cursor-pointer hover:bg-surface-container/50 transition-colors" onclick='openEditCat(${JSON.stringify(c)})'>
    <div class="flex items-center gap-3 flex-row-reverse">
      <span class="text-2xl">${c.emoji}</span>
      <span class="font-body-md text-body-md text-on-surface">${c.name}</span>
    </div>
    <span class="material-symbols-outlined text-on-surface-variant text-[18px]">edit</span>
  </div>`;
}

function renderCommitments(){
  const list=document.getElementById('commitments-list');
  const active=state.commitments.filter(c=>c.isActive);
  if(!active.length){list.innerHTML='<div class="px-4 py-6 text-center text-on-surface-variant font-body-md text-body-md">لا توجد التزامات ثابتة.</div>';return;}
  list.innerHTML=active.map(c=>{
    const next=c.nextRunDate?.toDate?c.nextRunDate.toDate():new Date(c.nextRunDate);
    const daysLeft=Math.ceil((next-new Date())/86400000);
    const typeColor=c.type==='income'?'text-[#39FF14]':'text-error';
    return `<div class="setting-row cursor-pointer hover:bg-surface-container/50 transition-colors" onclick='openEditCommit(${JSON.stringify({...c,nextRunDate:null,startDate:null,endDate:null,createdAt:null,lastRunDate:null})})'>
      <div class="flex flex-col items-end">
        <span class="font-body-md text-body-md text-on-surface">${c.name}</span>
        <span class="font-number-sm text-number-sm text-on-surface-variant">بعد ${daysLeft} يوم · يوم ${c.dayOfMonth} شهرياً</span>
      </div>
      <div class="flex flex-col items-start">
        <span class="font-body-md text-body-md font-bold ${typeColor}">${fmt(c.amount)} JOD</span>
        <span class="material-symbols-outlined text-on-surface-variant text-[18px]">edit</span>
      </div>
    </div>`;
  }).join('');
}

function fmt(n){return Number(n).toLocaleString('en-JO',{minimumFractionDigits:2,maximumFractionDigits:2});}

function populateAccountSelect(){
  document.getElementById('commit-account').innerHTML=
    '<option value="">اختر الحساب...</option>'+
    state.accounts.map(a=>`<option value="${a.id}">${a.icon||'💰'} ${a.name}</option>`).join('');
}

// CATEGORY MODAL
function openCatModal(){
  state.editCat=null;
  document.getElementById('cat-modal-title').textContent='فئة جديدة';
  document.getElementById('cat-name').value='';
  document.getElementById('emoji-input').value='';
  document.getElementById('emoji-btn').textContent='📦';
  document.getElementById('cat-edit-actions').classList.add('hidden');
  setCatType('expense');
  document.getElementById('cat-modal').classList.add('active');
}
function openEditCat(cat){
  state.editCat=cat;
  document.getElementById('cat-modal-title').textContent='تعديل الفئة';
  document.getElementById('cat-name').value=cat.name;
  document.getElementById('emoji-btn').textContent=cat.emoji||'📦';
  document.getElementById('emoji-input').value=cat.emoji||'';
  document.getElementById('cat-edit-actions').classList.remove('hidden');
  setCatType(cat.type);
  document.getElementById('cat-modal').classList.add('active');
}
function closeCatModal(){document.getElementById('cat-modal').classList.remove('active');}
function setCatType(t){
  state.catType=t;
  document.getElementById('cat-expense-btn').className='flex-1 py-2 rounded-full font-label-caps text-label-caps transition-colors '+(t==='expense'?'bg-error text-white':'text-on-surface-variant');
  document.getElementById('cat-income-btn').className='flex-1 py-2 rounded-full font-label-caps text-label-caps transition-colors '+(t==='income'?'bg-[#39FF14] text-background':'text-on-surface-variant');
}
async function submitCategory(){
  const name=document.getElementById('cat-name').value.trim();
  const emoji=document.getElementById('emoji-input').value||document.getElementById('emoji-btn').textContent||'📦';
  if(!name){showToast('أدخل اسم الفئة','error');return;}
  try{
    if(state.editCat){
      await DB.updateCategory(state.editCat.id,{name,emoji,type:state.catType});
      showToast('تم التعديل ✅');
    }else{
      await DB.addCategory(app.user.uid,{name,emoji,type:state.catType});
      showToast('تم الإضافة ✅');
    }
    closeCatModal(); await loadAll();
  }catch(e){showToast('خطأ','error');}
}
async function deleteCategory(){
  if(!confirm('حذف هذه الفئة؟'))return;
  await DB.deleteCategory(state.editCat.id);
  showToast('تم الحذف'); closeCatModal(); await loadAll();
}

// COMMITMENT MODAL
function openCommitModal(){
  state.editCommit=null;
  document.getElementById('commit-modal-title').textContent='التزام ثابت جديد';
  document.getElementById('commit-name').value='';
  document.getElementById('commit-amount').value='';
  document.getElementById('commit-day').value='1';
  document.getElementById('commit-start').value=new Date().toISOString().split('T')[0];
  document.getElementById('commit-end').value='';
  document.getElementById('commit-edit-actions').classList.add('hidden');
  setCommitType('expense');
  document.getElementById('commit-modal').classList.add('active');
}
function openEditCommit(c){
  state.editCommit=c;
  document.getElementById('commit-modal-title').textContent='تعديل الالتزام';
  document.getElementById('commit-name').value=c.name;
  document.getElementById('commit-amount').value=c.amount;
  document.getElementById('commit-day').value=c.dayOfMonth||1;
  document.getElementById('commit-account').value=c.accountId||'';
  document.getElementById('commit-edit-actions').classList.remove('hidden');
  setCommitType(c.type||'expense');
  document.getElementById('commit-modal').classList.add('active');
}
function closeCommitModal(){document.getElementById('commit-modal').classList.remove('active');}
function setCommitType(t){
  state.commitType=t;
  document.getElementById('commit-expense-btn').className='flex-1 py-2 rounded-full font-label-caps text-label-caps transition-colors '+(t==='expense'?'bg-error text-white':'text-on-surface-variant');
  document.getElementById('commit-income-btn').className='flex-1 py-2 rounded-full font-label-caps text-label-caps transition-colors '+(t==='income'?'bg-[#39FF14] text-background':'text-on-surface-variant');
}
async function submitCommitment(){
  const name=document.getElementById('commit-name').value.trim();
  const amount=parseFloat(document.getElementById('commit-amount').value);
  const accountId=document.getElementById('commit-account').value;
  const dayOfMonth=parseInt(document.getElementById('commit-day').value)||1;
  const startDate=document.getElementById('commit-start').value;
  const endDate=document.getElementById('commit-end').value||null;
  if(!name){showToast('أدخل اسماً','error');return;}
  if(!amount||amount<=0){showToast('أدخل مبلغاً','error');return;}
  if(!accountId){showToast('اختر الحساب','error');return;}
  try{
    if(state.editCommit){
      await DB.updateCommitment(state.editCommit.id,{name,amount,type:state.commitType,accountId,dayOfMonth});
      showToast('تم التعديل ✅');
    }else{
      await DB.addCommitment(app.user.uid,{name,amount,type:state.commitType,accountId,dayOfMonth,startDate,endDate});
      showToast('تم الإضافة ✅');
    }
    closeCommitModal(); await loadAll();
  }catch(e){console.error(e);showToast('خطأ','error');}
}
async function deleteCommitment(){
  if(!confirm('إيقاف هذا الالتزام؟'))return;
  await DB.deleteCommitment(state.editCommit.id);
  showToast('تم الإيقاف'); closeCommitModal(); await loadAll();
}

function signOut(){
  if(!confirm('تسجيل الخروج؟'))return;
  auth.signOut().then(()=>window.location.href='index.html');
}
</script>
</body>
</html>
