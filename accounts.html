<!DOCTYPE html>

<head>

<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>الحسابات - Money with Basel</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{"surface-container-low":"#111118","on-surface-variant":"#a098b0","on-surface":"#e8e0f0",error:"#ff4444",background:"#0a0a12","surface-container-high":"#1e1e30",tertiary:"#ffe04a","surface-bright":"#1a1a2e",outline:"#5a5068","primary-fixed":"#ffe0ec","error-container":"#3d0f0f","surface-container":"#141422","outline-variant":"#302840","on-primary-container":"#ffe0ec","surface-container-lowest":"#0a0a12","surface-tint":"#ff2d78",secondary:"#00ffcc","surface-dim":"#0f0f1a","primary-container":"#b3004e","on-background":"#e8e0f0","on-primary":"#1a0010","surface-container-highest":"#28283e","primary-fixed-dim":"#ff80aa","surface-variant":"#1e1e30",primary:"#ff2d78",surface:"#0f0f1a"},borderRadius:{DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem",full:"0.75rem"},spacing:{"container-padding":"24px",unit:"8px","section-margin":"40px",gutter:"16px","card-gap":"20px"},fontFamily:{"label-caps":["Almarai","sans-serif"],"headline-md":["Almarai","sans-serif"],"body-lg":["Almarai","sans-serif"],"number-sm":["Almarai","sans-serif"],"display-lg":["Almarai","sans-serif"],"body-md":["Almarai","sans-serif"],"number-lg":["Almarai","sans-serif"],"headline-lg":["Almarai","sans-serif"]},fontSize:{"label-caps":["12px",{lineHeight:"16px",fontWeight:"700"}],"headline-md":["24px",{lineHeight:"32px",fontWeight:"600"}],"body-lg":["18px",{lineHeight:"28px",fontWeight:"400"}],"number-sm":["14px",{lineHeight:"20px",fontWeight:"400"}],"display-lg":["48px",{lineHeight:"56px",letterSpacing:"-0.02em",fontWeight:"700"}],"body-md":["16px",{lineHeight:"24px",fontWeight:"400"}],"number-lg":["24px",{lineHeight:"32px",fontWeight:"500"}],"headline-lg":["32px",{lineHeight:"40px",letterSpacing:"-0.01em",fontWeight:"600"}]}}}};
</script>
<style>
body{font-family:'Almarai',sans-serif;min-height:max(884px,100dvh);}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.fill-icon{font-variation-settings:'FILL' 1;}
.card-surface{background-color:#1E1E1E;border:1px solid #2D2D2D;border-radius:16px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-sheet{background:#1E1E1E;border-radius:24px 24px 0 0;width:100%;max-width:640px;padding:24px;max-height:90vh;overflow-y:auto;}
.transfer-modal{align-items:center;}
.transfer-sheet{background:#1E1E1E;border-radius:24px;width:90%;max-width:500px;padding:24px;}
</style>
</head>
<body class="bg-background text-on-background antialiased pb-[90px] md:pb-0">

<header class="sticky top-0 w-full bg-background border-b border-outline-variant/30 z-50">
  <div class="flex flex-row-reverse justify-between items-center px-container-padding h-16 max-w-[1200px] mx-auto">
    <h1 class="font-headline-md text-headline-md font-bold text-primary">الحسابات</h1>
    <button onclick="openAddModal()" class="flex items-center gap-1 px-4 py-2 rounded-full bg-primary-container text-on-primary-container font-label-caps text-label-caps hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined text-[18px]">add</span> حساب جديد
    </button>
  </div>
</header>

<main class="max-w-[1200px] mx-auto px-container-padding pt-6 flex flex-col gap-6">

  <!-- Total balance hero -->
  <div class="card-surface p-container-padding relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-primary-container/10 to-transparent pointer-events-none"></div>
    <p class="font-body-md text-body-md text-on-surface-variant mb-1 text-right relative z-10">إجمالي الرصيد</p>
    <div class="flex items-baseline gap-2 flex-row-reverse relative z-10">
      <span id="total-balance" class="font-display-lg text-display-lg text-primary-fixed font-bold">—</span>
      <span class="font-body-lg text-body-lg text-on-surface-variant currency-unit">JOD</span>
    </div>
    <button onclick="openTransferModal()" class="mt-4 flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-primary-fixed hover:text-primary-fixed transition-colors font-label-caps text-label-caps relative z-10">
      <span class="material-symbols-outlined text-[18px]">swap_horiz</span> تحويل بين الحسابات
    </button>
  </div>

  <!-- Accounts grid -->
  <div>
    <h2 class="font-headline-md text-headline-md text-on-surface text-right mb-4">محافظك وحساباتك</h2>
    <div id="accounts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-card-gap">
      <div class="h-32 rounded-2xl bg-surface-container-high animate-pulse"></div>
      <div class="h-32 rounded-2xl bg-surface-container-high animate-pulse"></div>
      <div class="h-32 rounded-2xl bg-surface-container-high animate-pulse"></div>
    </div>
  </div>

  <!-- Add Account CTA (empty state) -->
  <div id="empty-state" class="hidden flex flex-col items-center gap-4 py-12">
    <span class="text-6xl">💼</span>
    <p class="font-body-lg text-body-lg text-on-surface-variant">لا توجد حسابات بعد</p>
    <button onclick="openAddModal()" class="px-6 py-3 rounded-full bg-primary-container text-on-primary-container font-label-caps text-label-caps hover:opacity-80">أضف حسابك الأول</button>
  </div>
</main>

<!-- BOTTOM NAV -->
<!-- استخدم هذا الـ Nav فقط -->
<nav class="bg-surface/95 backdrop-blur border-t border-surface-variant md:border-t-0 md:border-l md:border-surface-variant fixed bottom-0 md:top-0 md:right-0 w-full md:w-20 h-16 md:h-screen z-50 flex md:flex-col justify-around items-center px-2 py-2 pb-safe md:pb-0 shadow-[0_-4px_30px_rgba(0,0,0,0.4)] md:shadow-none">
    <a href="dashboard.html" class="nav-link">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] md:hidden font-bold">الرئيسية</span>
    </a>
    <a href="transactions.html" class="nav-link">
        <span class="material-symbols-outlined">receipt_long</span>
        <span class="text-[10px] md:hidden font-bold">الحركات</span>
    </a>
    <button onclick="openAddModal()" class="nav-main-btn">
        <span class="material-symbols-outlined">add</span>
    </button>
    <a href="accounts.html" class="nav-link active">
        <span class="material-symbols-outlined">account_balance_wallet</span>
        <span class="text-[10px] md:hidden font-bold">الحسابات</span>
    </a>
    <a href="settings.html" class="nav-link">
        <span class="material-symbols-outlined">settings</span>
        <span class="text-[10px] md:hidden font-bold">الإعدادات</span>
    </a>
</nav>

<!-- ملاحظة: أضف هذا الـ Padding للـ body في الـ CSS ليظهر المحتوى بجانب الـ Nav في اللابتوب -->
<style>
    @media (min-width: 768px) {
        body { padding-right: 80px; } /* يزيح المحتوى لليسار ليترك مساحة للـ Sidebar */
      
    }
</style>

<!-- ADD/EDIT ACCOUNT MODAL -->
<div id="acc-modal" class="modal-overlay" onclick="if(event.target===this)closeAccModal()">
  <div class="modal-sheet">
    <div class="flex justify-between items-center mb-6 flex-row-reverse">
      <h2 id="acc-modal-title" class="font-headline-md text-headline-md text-on-surface">حساب جديد</h2>
      <button onclick="closeAccModal()" class="text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
    </div>
    <!-- Icon picker -->
    <div class="flex gap-2 mb-4 flex-row-reverse overflow-x-auto pb-1">
      <span class="text-[10px] text-on-surface-variant mt-2 shrink-0">اختر أيقونة:</span>
      <div id="icon-picker" class="flex gap-2"></div>
    </div>
    <input id="acc-name" type="text" placeholder="اسم الحساب (مثال: كاش، زين كاش)" class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary-container mb-4 text-right"/>
    <select id="acc-type" class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface focus:outline-none focus:border-primary-container mb-4 text-right appearance-none">
      <option value="cash">كاش 💵</option>
      <option value="bank">بنك 🏦</option>
      <option value="savings">توفير 🏺</option>
      <option value="credit">بطاقة 💳</option>
    </select>
    <div class="relative mb-4">
      <input id="acc-balance" type="number" placeholder="الرصيد الافتتاحي" inputmode="decimal"
        class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary-container text-right"/>
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md text-body-md currency-unit">JOD</span>
    </div>
    <div id="edit-actions" class="hidden flex gap-3 mb-3">
      <button onclick="deleteAccount()" class="flex-1 h-12 bg-error/20 text-error font-label-caps text-label-caps rounded-full hover:bg-error/30 transition-colors">حذف الحساب</button>
    </div>
    <button onclick="submitAccount()" class="w-full h-14 bg-[#39FF14] text-background font-headline-md font-bold rounded-full hover:opacity-90 transition-opacity">حفظ</button>
  </div>
</div>

<!-- TRANSFER MODAL -->
<div id="transfer-modal" class="modal-overlay transfer-modal" onclick="if(event.target===this)closeTransferModal()">
  <div class="transfer-sheet">
    <div class="flex justify-between items-center mb-6 flex-row-reverse">
      <h2 class="font-headline-md text-headline-md text-on-surface">تحويل بين الحسابات</h2>
      <button onclick="closeTransferModal()" class="text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
    </div>
    <select id="from-acc" class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface focus:outline-none focus:border-primary-container mb-4 text-right appearance-none"></select>
    <div class="flex justify-center my-2">
      <span class="material-symbols-outlined text-on-surface-variant text-[32px]">arrow_downward</span>
    </div>
    <select id="to-acc" class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface focus:outline-none focus:border-primary-container mb-4 text-right appearance-none"></select>
    <div class="relative mb-6">
      <input id="transfer-amount" type="number" placeholder="المبلغ" inputmode="decimal"
        class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-xl px-4 font-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary-container text-right"/>
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md text-body-md currency-unit">JOD</span>
    </div>
    <button onclick="submitTransfer()" class="w-full h-14 bg-[#39FF14] text-background font-headline-md font-bold rounded-full hover:opacity-90 transition-opacity">تحويل</button>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/db.js"></script>
<script>
const ICONS=['💰','🏦','💳','🏺','💵','📱','🏠','🚗','💼','🎯'];
let state={accounts:[],editAcc:null,selectedIcon:'💰'};

auth.onAuthStateChanged(async u=>{
  if(!u){window.location.href='index.html';return;}
  app.user=u;
  await loadAccounts();
  UI.updateCurrencyUnits();
  renderAccounts();
});

function renderAccounts(){
  const grid=document.getElementById('accounts-grid');
  const empty=document.getElementById('empty-state');
  const total=state.accounts.reduce((s,a)=>s+(a.balance||0),0);
  document.getElementById('total-balance').textContent=fmt(total);
  if(!state.accounts.length){grid.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  const typeLabel={cash:'كاش',bank:'بنك',savings:'توفير',credit:'بطاقة'};
  grid.innerHTML=state.accounts.map(a=>`
    <div class="card-surface p-6 flex flex-col gap-4 hover:border-primary-fixed/50 transition-colors cursor-pointer group" onclick='openEditModal(${JSON.stringify(a)})'>
      <div class="flex justify-between items-start flex-row-reverse">
        <div class="flex items-center gap-3 flex-row-reverse">
          <span class="text-3xl">${a.icon||'💰'}</span>
          <div class="flex flex-col items-end">
            <span class="font-body-lg text-body-lg font-bold text-on-surface">${a.name}</span>
            <span class="font-label-caps text-label-caps text-on-surface-variant">${typeLabel[a.type]||a.type}</span>
          </div>
        </div>
        <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-fixed transition-colors">edit</span>
      </div>
      <div class="flex flex-col items-end">
        <span class="font-display-lg text-[32px] leading-tight font-bold ${(a.balance||0)>=0?'text-primary-fixed':'text-error'}">${fmt(a.balance||0)}</span>
        <span class="font-body-md text-body-md text-on-surface-variant currency-unit">JOD</span>
      </div>
    </div>`).join('');
}

async function loadAccounts(){
  state.accounts = await DB.getAccounts(app.user.uid);
  renderAccounts();
  UI.updateCurrencyUnits();
}

function fmt(n){return Number(n).toLocaleString('en-JO',{minimumFractionDigits:2,maximumFractionDigits:2});}

// ADD MODAL
function openAddModal(){
  state.editAcc=null;
  state.selectedIcon='💰';
  document.getElementById('acc-modal-title').textContent='حساب جديد';
  document.getElementById('acc-name').value='';
  document.getElementById('acc-balance').value='';
  document.getElementById('acc-type').value='cash';
  document.getElementById('edit-actions').classList.add('hidden');
  renderIconPicker();
  document.getElementById('acc-modal').classList.add('active');
}

function openEditModal(acc){
  state.editAcc=acc;
  state.selectedIcon=acc.icon||'💰';
  document.getElementById('acc-modal-title').textContent='تعديل الحساب';
  document.getElementById('acc-name').value=acc.name;
  document.getElementById('acc-balance').value=acc.balance||0;
  document.getElementById('acc-type').value=acc.type||'cash';
  document.getElementById('edit-actions').classList.remove('hidden');
  renderIconPicker();
  document.getElementById('acc-modal').classList.add('active');
}

function closeAccModal(){document.getElementById('acc-modal').classList.remove('active');}

function renderIconPicker(){
  document.getElementById('icon-picker').innerHTML=ICONS.map(ic=>`
    <button onclick="selectIcon('${ic}')" class="w-10 h-10 rounded-full flex items-center justify-center text-xl transition-all ${state.selectedIcon===ic?'bg-primary-container/20 ring-2 ring-primary-fixed':'bg-surface-container-highest hover:bg-surface-container-high'}">${ic}</button>`).join('');
}

function selectIcon(ic){state.selectedIcon=ic;renderIconPicker();}

async function submitAccount(){
  const name=document.getElementById('acc-name').value.trim();
  const balance=parseFloat(document.getElementById('acc-balance').value)||0;
  const type=document.getElementById('acc-type').value;
  if(!name){showToast('أدخل اسم الحساب','error');return;}
  try{
    if(state.editAcc){
      await DB.updateAccount(state.editAcc.id,{name,type,balance,icon:state.selectedIcon});
      showToast('تم التعديل ✅');
    }else{
      await DB.addAccount(app.user.uid,{name,type,balance,icon:state.selectedIcon});
      showToast('تم الإضافة ✅');
    }
    closeAccModal();
    await loadAccounts();
  }catch(e){console.error(e);showToast('خطأ','error');}
}

async function deleteAccount(){
  if(!confirm('حذف هذا الحساب نهائياً؟'))return;
  try{
    await DB.deleteAccount(state.editAcc.id);
    showToast('تم الحذف');
    closeAccModal();
    await loadAccounts();
  }catch(e){showToast('خطأ','error');}
}

// TRANSFER MODAL
function openTransferModal(){
  const currency = UI.getCurrency();
  const opts='<option value="">اختر...</option>'+state.accounts.map(a=>`<option value="${a.id}">${a.icon||'💰'} ${a.name} — ${fmt(a.balance)} ${currency}</option>`).join('');
  document.getElementById('from-acc').innerHTML=opts;
  document.getElementById('to-acc').innerHTML=opts;
  document.getElementById('transfer-amount').value='';
  document.getElementById('transfer-modal').classList.add('active');
}
function closeTransferModal(){document.getElementById('transfer-modal').classList.remove('active');}
async function submitTransfer(){
  const fromId=document.getElementById('from-acc').value;
  const toId=document.getElementById('to-acc').value;
  const amount=parseFloat(document.getElementById('transfer-amount').value);
  if(!fromId||!toId){showToast('اختر الحسابين','error');return;}
  if(fromId===toId){showToast('الحسابان متماثلان','error');return;}
  if(!amount||amount<=0){showToast('أدخل مبلغاً','error');return;}
  try{
    await DB.transferBetweenAccounts(fromId,toId,amount,app.user.uid);
    showToast('تم التحويل ✅');
    closeTransferModal();
    await loadAccounts();
  }catch(e){console.error(e);showToast('خطأ','error');}
}
</script>
</body>
</html>
