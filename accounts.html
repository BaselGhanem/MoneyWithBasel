<script>
const ICONS=['💰','🏦','💳','🏺','💵','📱','🏠','🚗','💼','🎯'];
let state={accounts:[],editAcc:null,selectedIcon:'💰'};

auth.onAuthStateChanged(async u=>{
  if(!u){window.location.href='index.html';return;}
  app.user=u;
  await UI.loadUserPreferences(u.uid);
  await loadAccounts();
  UI.updateCurrencyUnits();
  renderAccounts();
});

function renderAccounts(){
  const grid=document.getElementById('accounts-grid');
  const empty=document.getElementById('empty-state');
  const total=state.accounts.reduce((s,a)=>s+(a.balance||0),0);
  document.getElementById('total-balance').textContent=fmt(total);
  if(!state.accounts.length){grid.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  const typeLabel={cash:'كاش',bank:'بنك',savings:'توفير',credit:'بطاقة'};
  grid.innerHTML=state.accounts.map(a=>`
    <div class="card-surface p-6 flex flex-col gap-6 aurora-card cursor-pointer group animate-card" onclick="window.location.href='account-details.html?id=${a.id}'">
      <div class="flex justify-between items-start flex-row-reverse">
        <div class="flex items-center gap-3 flex-row-reverse">
          <div class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">
            ${a.icon||'💰'}
          </div>
          <div class="flex flex-col items-end">
            <span class="text-xl font-black text-on-surface">${a.name}</span>
            <span class="font-label-caps text-label-caps text-on-surface-variant">${typeLabel[a.type]||a.type}</span>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="event.stopPropagation(); openEditModal('${a.id}')" class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant group-hover:text-primary transition-colors">
            <span class="material-symbols-outlined">edit</span>
          </button>
          <button onclick="event.stopPropagation(); confirmAndDeleteAccount(event, '${a.id}')" class="p-1 rounded-full hover:bg-white/10 text-on-surface-variant group-hover:text-error transition-colors">
            <span class="material-symbols-outlined" data-delete-btn>delete</span>
          </button>
        </div>
      </div>
      <div class="flex flex-col items-end">
        <span class="font-display-lg text-[32px] leading-tight font-bold ${(a.balance||0)>=0?'text-primary-fixed':'text-error'}">${fmt(a.balance||0)}</span>
        <span class="font-body-md text-body-md text-on-surface-variant currency-unit">JOD</span>
      </div>
    </div>`).join('');
}

async function loadAccounts(){
  state.accounts = await DB.getAccounts(app.user.uid);
  renderAccounts();
  UI.updateCurrencyUnits();
}

function fmt(n){return Number(n).toLocaleString('en-JO',{minimumFractionDigits:2,maximumFractionDigits:2});}

// ADD MODAL
function openAddModal(){
  state.editAcc=null;
  state.selectedIcon='💰';
  document.getElementById('acc-modal-title').textContent='حساب جديد';
  document.getElementById('acc-name').value='';
  document.getElementById('acc-balance').value='';
  document.getElementById('acc-type').value='cash';
  document.getElementById('edit-actions').classList.add('hidden');
  renderIconPicker();
  document.getElementById('acc-modal').classList.add('active');
}

function openEditModal(accOrId){
  const acc = typeof accOrId === 'string' 
    ? state.accounts.find(a => a.id === accOrId) 
    : accOrId;
  if(!acc) return;
  state.editAcc=acc;
  state.selectedIcon=acc.icon||'💰';
  document.getElementById('acc-modal-title').textContent='تعديل الحساب';
  document.getElementById('acc-name').value=acc.name;
  document.getElementById('acc-balance').value=acc.balance||0;
  document.getElementById('acc-type').value=acc.type||'cash';
  document.getElementById('edit-actions').classList.remove('hidden');
  renderIconPicker();
  document.getElementById('acc-modal').classList.add('active');
}

function closeAccModal(){document.getElementById('acc-modal').classList.remove('active');}

function renderIconPicker(){
  document.getElementById('icon-picker').innerHTML=ICONS.map(ic=>`
    <button onclick="selectIcon('${ic}')" class="w-10 h-10 rounded-full flex items-center justify-center text-xl transition-all ${state.selectedIcon===ic?'bg-primary-container/20 ring-2 ring-primary-fixed':'bg-surface-container-highest hover:bg-surface-container-high'}">${ic}</button>`).join('');
}

function selectIcon(ic){state.selectedIcon=ic;renderIconPicker();}

async function submitAccount(){
  const name=document.getElementById('acc-name').value.trim();
  const balance=parseFloat(document.getElementById('acc-balance').value)||0;
  const type=document.getElementById('acc-type').value;
  if(!name){showToast('أدخل اسم الحساب','error');return;}
  try{
    if(state.editAcc){
      await DB.updateAccount(state.editAcc.id,{name,type,balance,icon:state.selectedIcon});
      showToast('تم التعديل ✅');
    }else{
      await DB.addAccount(app.user.uid,{name,type,balance,icon:state.selectedIcon});
      showToast('تم الإضافة ✅');
    }
    closeAccModal();
    await loadAccounts();
  }catch(e){console.error(e);showToast('خطأ','error');}
}

async function deleteAccount(skipConfirm = false){
  if(!skipConfirm) {
    if(!confirm('سيتم حذف هذا الحساب وجميع الحركات والالتزامات المرتبطة به نهائياً. هل أنت متأكد؟')) return;
  }
  try{
    await DB.deleteAccount(state.editAcc.id);
    UI.showToast('تم الحذف ✅');
    closeAccModal();
    await loadAccounts();
  }catch(e){UI.showToast('خطأ أثناء الحذف','error');}
}

// TRANSFER MODAL
function openTransferModal(){
  // Populate 'from' and 'to' account selects
  const currency = UI.getCurrency();
  const opts='<option value="">اختر...</option>'+state.accounts.map(a=>`<option value="${a.id}">${a.icon||'💰'} ${a.name} — ${fmt(a.balance)} ${currency}</option>`).join('');
  document.getElementById('from-acc').innerHTML=opts;
  document.getElementById('to-acc').innerHTML=opts;
  document.getElementById('transfer-amount').value='';
  document.getElementById('transfer-modal').classList.add('active');
}

// New function to handle delete confirmation from the card
async function confirmAndDeleteAccount(event, accountId) {
  state.editAcc = state.accounts.find(acc => acc.id === accountId);
  if (!state.editAcc) {
    UI.showToast('الحساب غير موجود', 'error');
    return;
  }

  if(!confirm('سيتم حذف هذا الحساب وجميع الحركات والالتزامات المرتبطة به نهائياً. هل أنت متأكد؟')) return;

  const deleteButton = event.currentTarget;
  const accountCard = deleteButton.closest('.card-surface');
  const originalDeleteIcon = deleteButton.querySelector('.material-symbols-outlined').textContent;

  try {
    accountCard.classList.add('deleting');
    deleteButton.querySelector('.material-symbols-outlined').textContent = 'sentiment_dissatisfied'; // Change icon to sad face
    
    // Small delay to allow the "sad" animation to be seen before the re-render
    await new Promise(r => setTimeout(r, 400));
    await deleteAccount(true); // تخطي التأكيد لأننا أكدنا بالفعل في confirmAndDeleteAccount
  } catch(e) {
    console.error('خطأ في حذف الحساب:', e);
    UI.showToast('خطأ في حذف الحساب', 'error');
    // Revert animation and icon on error
    accountCard.classList.remove('deleting');
    deleteButton.querySelector('.material-symbols-outlined').textContent = originalDeleteIcon;
  }
}
function closeTransferModal(){document.getElementById('transfer-modal').classList.remove('active');}
async function submitTransfer(){
  const fromId=document.getElementById('from-acc').value;
  const toId=document.getElementById('to-acc').value;
  const amount=parseFloat(document.getElementById('transfer-amount').value);
  if(!fromId||!toId){showToast('اختر الحسابين','error');return;}
  if(fromId===toId){showToast('الحسابان متماثلان','error');return;}
  if(!amount||amount<=0){showToast('أدخل مبلغاً','error');return;}
  try{
    await DB.transferBetweenAccounts(fromId,toId,amount,app.user.uid);
    showToast('تم التحويل ✅');
    closeTransferModal();
    await loadAccounts();
  }catch(e){console.error(e);showToast('خطأ','error');}
}
</script>
