<script src="js/app.js"></script>
<script src="js/db.js"></script>
<script>
let state={txType:'expense',isRecurring:false,selectedCatId:null,categories:[],accounts:[],allTx:[],filtered:[],filter:'all',curYear:new Date().getFullYear(),curMonth:new Date().getMonth(),editTx:null,editCatId:null};

auth.onAuthStateChanged(async u=>{
  if(!u){window.location.href='index.html';return;}
  document.body.style.display = 'block';
  app.user=u;
  const [accs,cats]=await Promise.all([DB.getAccounts(u.uid),DB.getCategories(u.uid)]);
  state.accounts=accs; state.categories=cats;
  populateAccountSelects();
  await loadMonth();
});

async function loadMonth(){
  renderSkeleton();
  updateMonthLabel();
  const s=new Date(state.curYear,state.curMonth,1);
  const e=new Date(state.curYear,state.curMonth+1,0,23,59,59);
  state.allTx=await DB.getTransactions(app.user.uid,{startDate:s,endDate:e});
  filterTransactions();
}

function renderSkeleton() {
  const list = document.getElementById('tx-list');
  document.getElementById('tx-empty').classList.add('hidden');
  list.innerHTML = Array(2).fill(0).map(() => `
    <div class="flex flex-col gap-2">
      <div class="skeleton w-40 h-4 mb-2 opacity-30"></div>
      <div class="card-surface overflow-hidden">
        ${Array(3).fill(0).map(() => `
          <div class="flex flex-row-reverse items-center justify-between py-4 px-4 border-b border-white/5 last:border-0">
            <div class="flex flex-row-reverse items-center gap-3">
              <div class="w-11 h-11 rounded-full skeleton opacity-50"></div>
              <div class="flex flex-col items-end gap-2">
                <div class="skeleton w-32 h-4 opacity-40"></div>
                <div class="skeleton w-20 h-3 opacity-30"></div>
              </div>
            </div>
            <div class="skeleton w-24 h-5 opacity-40"></div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function updateMonthLabel(){
  document.getElementById('month-label').textContent=
    new Date(state.curYear,state.curMonth,1).toLocaleDateString('ar-JO',{month:'long',year:'numeric'});
}
function prevMonth(){if(state.curMonth===0){state.curMonth=11;state.curYear--;}else state.curMonth--;loadMonth();}
function nextMonth(){if(state.curMonth===11){state.curMonth=0;state.curYear++;}else state.curMonth++;loadMonth();}

function setFilter(f){
  state.filter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-active'));
  document.querySelectorAll('.chip').forEach(c=>c.classList.add('text-on-surface-variant'));
  const el=document.getElementById('f-'+f);
  el.classList.add('chip-active'); el.classList.remove('text-on-surface-variant');
  filterTransactions();
}

function filterTransactions(){
  const q=document.getElementById('search-input').value.toLowerCase();
  let tx=[...state.allTx];
  if(state.filter==='expense')   tx=tx.filter(t=>t.type==='expense');
  if(state.filter==='income')    tx=tx.filter(t=>t.type==='income');
  if(state.filter==='recurring') tx=tx.filter(t=>t.isRecurring);
  if(q) tx=tx.filter(t=>(t.note||'').toLowerCase().includes(q)||(getCatName(t.categoryId)||'').toLowerCase().includes(q));
  state.filtered=tx;
  renderSummary(tx);
  renderList(tx);
}

function renderSummary(tx){
  const inc=tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const currency = UI.getCurrency();
  document.getElementById('sum-income').textContent = fmt(inc) + ' ' + currency;
  document.getElementById('sum-expense').textContent = fmt(exp) + ' ' + currency;
  const net=inc-exp;
  const el=document.getElementById('sum-net');
  el.textContent=(net>=0?'+':'')+fmt(net) + ' ' + currency;
  el.className='font-body-md text-body-md font-bold '+(net>=0?'text-[#39FF14]':'text-error');
}

function renderList(tx){
  const list=document.getElementById('tx-list');
  const empty=document.getElementById('tx-empty');
  if(!tx.length){list.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  // Group by date
  const groups={};
  tx.forEach(t=>{
    const d=t.date?.toDate?t.date.toDate():new Date(t.date);
    const key=d.toLocaleDateString('ar-JO',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  list.innerHTML=Object.entries(groups).map(([date,txs], idx)=>`
    <div class="flex flex-col gap-2 animate-card" style="animation-delay: ${idx * 0.1}s">
      <span class="font-label-caps text-label-caps text-on-surface-variant px-1 pt-2">${date}</span>
      <div class="card-surface overflow-hidden">
        ${txs.map(t=>txCard(t)).join('')}
      </div>
    </div>`).join('');
}

function txCard(t){
  const cat=state.categories.find(c=>c.id===t.categoryId);
  const acc=state.accounts.find(a=>a.id===t.accountId);
  const sign=t.type==='income'?'+':'-';
  const color=t.type==='income'?'text-[#39FF14]':'text-on-surface';
  const badge=t.isRecurring?'<span class="font-label-caps text-label-caps px-2 py-0.5 rounded-full bg-tertiary/20 text-tertiary ml-1">ثابت</span>':'';
  return `<div class="flex flex-row-reverse items-center justify-between py-3 px-4 border-b border-surface-container-high last:border-0 hover:bg-surface-container/50 transition-colors cursor-pointer" onclick="openViewModal('${t.id}')">
    <div class="flex flex-row-reverse items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-xl border border-outline-variant/30">
        ${cat?.emoji||(t.type==='income'?'💵':'💸')}
      </div>
      <div class="flex flex-col items-end">
        <div class="flex items-center gap-1 flex-row-reverse">
          <span class="font-body-md text-body-md font-semibold text-on-surface">${t.note||cat?.name||'—'}</span>${badge}
        </div>
        <span class="font-body-md text-number-sm text-on-surface-variant">${acc?.name||''}</span>
      </div>
    </div>
    <span class="font-body-md text-body-md font-medium ${color}">${sign}${fmt(t.amount)} ${UI.getCurrency()}</span>
  </div>`;
}

function fmt(n){return Number(n).toLocaleString('en-JO',{minimumFractionDigits:2,maximumFractionDigits:2});}
function getCatName(id){return state.categories.find(c=>c.id===id)?.name||'';}
function getAccountName(id){return state.accounts.find(a=>a.id===id)?.name||'';}

// ADD MODAL
function openAddModal(type='expense'){
  setTxType(type);
  document.getElementById('tx-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('tx-amount').value='';
  document.getElementById('tx-note').value='';
  state.selectedCatId=null;
  renderCategoryChips('tx-categories',state.txType,state.selectedCatId,id=>{state.selectedCatId=id;renderCategoryChips('tx-categories',state.txType,state.selectedCatId,arguments.callee);});
  document.getElementById('add-modal').classList.add('active');
}
function closeAddModal(){document.getElementById('add-modal').classList.remove('active');}
function setTxType(type){
  state.txType=type;
  document.getElementById('type-expense').className='flex-1 py-2 rounded-full font-label-caps text-label-caps transition-colors '+(type==='expense'?'bg-error text-white':'text-on-surface-variant');
  document.getElementById('type-income').className='flex-1 py-2 rounded-full font-label-caps text-label-caps transition-colors '+(type==='income'?'bg-[#39FF14] text-background':'text-on-surface-variant');
  renderCategoryChips('tx-categories',type,state.selectedCatId,id=>{state.selectedCatId=id;renderCategoryChips('tx-categories',type,state.selectedCatId,arguments.callee);});
}
function toggleRecurring(){
  state.isRecurring=!state.isRecurring;
  document.getElementById('recurring-toggle').classList.toggle('on',state.isRecurring);
  document.getElementById('recurring-options').classList.toggle('hidden',!state.isRecurring);
}
function renderCategoryChips(containerId,type,selId,onSelect){
  const cats=state.categories.filter(c=>c.type===type);
  document.getElementById(containerId).innerHTML=cats.map(c=>`
    <button onclick="(${onSelect.toString()})('${c.id}')" class="shrink-0 flex items-center gap-1 px-3 py-2 rounded-full border font-label-caps text-label-caps transition-colors ${selId===c.id?'border-primary-fixed bg-primary-container/20 text-primary-fixed':'border-outline-variant text-on-surface-variant hover:border-primary-fixed'}">
      <span>${c.emoji}</span><span>${c.name}</span>
    </button>`).join('');
}
function populateAccountSelects(){
  ['tx-account','edit-account'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    sel.innerHTML='<option value="">اختر الحساب...</option>'+state.accounts.map(a=>`<option value="${a.id}">${a.icon||'💰'} ${a.name}</option>`).join('');
  });
}
async function submitTransaction(){
  const amount=parseFloat(document.getElementById('tx-amount').value);
  const accountId=document.getElementById('tx-account').value;
  const note=document.getElementById('tx-note').value;
  const date=document.getElementById('tx-date').value;
  if(!amount||amount<=0){showToast('أدخل مبلغاً صحيحاً','error');return;}
  if(!accountId){showToast('اختر حساباً','error');return;}
  try{
    if(state.isRecurring){
      await DB.addCommitment(app.user.uid,{accountId,categoryId:state.selectedCatId,name:note||'التزام ثابت',amount,type:state.txType,dayOfMonth:parseInt(document.getElementById('tx-day').value)||1,startDate:date,endDate:document.getElementById('tx-end-date').value||null});
      showToast('تم إضافة الالتزام ✅');
    }else{
      await DB.addTransaction(app.user.uid,{accountId,categoryId:state.selectedCatId,amount,type:state.txType,date,note});
      showToast('تم الحفظ ✅');
    }
    closeAddModal();
    await loadMonth();
  }catch(e){console.error(e);showToast('خطأ، حاول مرة أخرى','error');}
}

// EDIT MODAL
function openViewModal(txId){
  const tx = state.allTx.find(t => t.id === txId);
  state.viewTx = tx;
  const date = tx.date?.seconds ? new Date(tx.date.seconds*1000) : new Date(tx.date);
  document.getElementById('view-amount').textContent = `${tx.type==='income'?'+':'-'}${fmt(tx.amount)} ${UI.getCurrency()}`;
  document.getElementById('view-account').textContent = getAccountName(tx.accountId);
  document.getElementById('view-category').textContent = getCatName(tx.categoryId);
  document.getElementById('view-date').textContent = date.toLocaleDateString('ar-JO', {year:'numeric',month:'long',day:'numeric'});
  document.getElementById('view-type').textContent = tx.type==='income' ? 'دخل' : 'مصروف';
  document.getElementById('view-recurring').textContent = tx.isRecurring ? 'ثابت' : 'عادي';
  document.getElementById('view-note').textContent = tx.note || 'لا توجد ملاحظة';
  document.getElementById('view-modal').classList.add('active');
}
function closeViewModal(){document.getElementById('view-modal').classList.remove('active');}
function openEditModal(tx){
  closeViewModal();
  state.editTx=tx;
  state.editCatId=tx.categoryId||null;
  document.getElementById('edit-amount').value=tx.amount;
  document.getElementById('edit-note').value=tx.note||'';
  document.getElementById('edit-account').value=tx.accountId;
  const d=tx.date?.seconds?new Date(tx.date.seconds*1000):new Date(tx.date);
  document.getElementById('edit-date').value=d.toISOString().split('T')[0];
  renderCategoryChips('edit-categories',tx.type,state.editCatId,id=>{state.editCatId=id;renderCategoryChips('edit-categories',tx.type,state.editCatId,arguments.callee);});
  document.getElementById('edit-modal').classList.add('active');
}
function closeEditModal(){document.getElementById('edit-modal').classList.remove('active');}
async function submitEdit(){
  const tx=state.editTx;
  const newData={accountId:document.getElementById('edit-account').value,categoryId:state.editCatId,amount:parseFloat(document.getElementById('edit-amount').value),type:tx.type,date:document.getElementById('edit-date').value,note:document.getElementById('edit-note').value};
  try{
    await DB.updateTransaction(tx.id,tx,newData);
    showToast('تم التعديل ✅');
    closeEditModal();
    await loadMonth();
  }catch(e){console.error(e);showToast('خطأ','error');}
}
async function deleteTransaction(){
  if(!confirm('هل تريد حذف هذه الحركة؟'))return;
  try{
    await DB.deleteTransaction(state.editTx.id,state.editTx);
    showToast('تم الحذف');
    closeEditModal();
    await loadMonth();
  }catch(e){showToast('خطأ','error');}
}
</script>
</body>
</html>
